name: Linux build
on: [push, pull_request]
jobs:
  linux:
    name: build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          java-package: jdk
          architecture: x64
          distribution: 'jetbrains'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: sudo apt update
      - run: sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - run: sudo apt install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle
      - run: tar jcvf minigames-linux-release-x64.tar.bz2 -C build/linux/x64/release bundle
      - name: release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: minigames-linux-release-x64.tar.bz2
