name: Android build
on: [push, pull_request]
jobs:
  android:
    name: build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          java-package: jdk
          architecture: x64
          distribution: 'jetbrains'
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: openssl enc -d -aes-256-cbc -K "$KEY" -iv "$IV" -in ./android/app/minigames.jks.enc -out ./android/app/minigames.jks
        env:
          KEY: ${{ secrets.ANDROID_KEY_K }}
          IV: ${{ secrets.ANDROID_KEY_IV }}
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk
      - run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/minigames-android-release.apk
      - name: release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/minigames-android-release.apk
